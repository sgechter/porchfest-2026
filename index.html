<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Somerville PorchFest 2026 – May 9</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; background: #f5f5f0; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; }
  #header { background: #2c5f2e; color: white; padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 700; }
  #header .sub { font-size: 12px; opacity: 0.8; }
  #header .spacer { flex: 1; }
  #print-btn { background: white; color: #2c5f2e; border: none; padding: 7px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 13px; }
  #print-btn:hover { background: #e8f5e9; }

  #filters { background: white; border-bottom: 1px solid #ddd; padding: 10px 16px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; flex-shrink: 0; }
  
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-label { font-weight: 600; font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
  
  /* Time filter */
  #time-presets { display: flex; gap: 6px; flex-wrap: wrap; }
  .preset-btn { background: #f0f0f0; border: 1px solid #ccc; padding: 4px 10px; border-radius: 14px; cursor: pointer; font-size: 12px; white-space: nowrap; }
  .preset-btn.active { background: #2c5f2e; color: white; border-color: #2c5f2e; }
  #time-range-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; font-size: 12px; color: #333; }
  #time-start, #time-end { width: 90px; accent-color: #2c5f2e; }
  
  /* Genre filter */
  #genre-grid { display: flex; flex-wrap: wrap; gap: 4px; max-width: 600px; }
  .genre-chip { display: inline-flex; align-items: center; gap: 4px; background: #f0f0f0; border: 1px solid #ccc; border-radius: 14px; padding: 3px 10px; cursor: pointer; font-size: 12px; user-select: none; }
  .genre-chip input { cursor: pointer; accent-color: #2c5f2e; }
  .genre-chip.checked { background: #e8f5e9; border-color: #2c5f2e; color: #1a3d1c; }
  
  .filter-actions { display: flex; flex-direction: column; gap: 4px; justify-content: flex-end; }
  .small-btn { background: none; border: 1px solid #aaa; padding: 4px 10px; border-radius: 14px; cursor: pointer; font-size: 11px; color: #555; }
  .small-btn:hover { background: #f0f0f0; }

  /* Result count */
  #result-bar { background: #2c5f2e; color: white; padding: 5px 16px; font-size: 12px; flex-shrink: 0; }

  /* Main split */
  #main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; }
  #list-panel { width: 340px; overflow-y: auto; background: white; border-left: 1px solid #ddd; flex-shrink: 0; }
  
  .venue-card { padding: 10px 14px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.1s; }
  .venue-card:hover { background: #f9fdf9; }
  .venue-card.highlighted { background: #e8f5e9; border-left: 3px solid #2c5f2e; }
  .venue-num { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; background: #2c5f2e; color: white; border-radius: 50%; font-size: 10px; font-weight: 700; margin-right: 6px; flex-shrink: 0; }
  .venue-addr { font-weight: 600; font-size: 13px; }
  .show-item { margin: 4px 0 0 26px; font-size: 12px; }
  .show-name { font-weight: 500; }
  .show-meta { color: #595959; font-size: 11px; } /* #595959 on white = 7.0:1, passes WCAG AA */

  /* Popup */
  .popup-content { max-width: 260px; }
  .popup-addr { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .popup-show { margin: 4px 0; padding: 4px 6px; background: #f5f5f0; border-radius: 4px; }
  .popup-show-name { font-weight: 600; font-size: 13px; }
  .popup-show-meta { font-size: 11px; color: #595959; } /* passes WCAG AA */

  /* Hover tooltip */
  .pf-tooltip { background: rgba(20,20,20,0.92); border: none; border-radius: 6px; padding: 6px 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.35); color: white; font-size: 12px; line-height: 1.5; max-width: 240px; }
  .pf-tooltip::before { display: none; }
  .leaflet-tooltip.pf-tooltip { white-space: normal; }
  .tt-addr { font-weight: 700; font-size: 11px; opacity: 0.75; margin-bottom: 2px; }
  .tt-name { font-weight: 600; }
  .tt-genre { opacity: 0.8; font-style: italic; }

  /* Focus styles for keyboard navigation */
  :focus-visible { outline: 3px solid #2c5f2e; outline-offset: 2px; border-radius: 2px; }
  .preset-btn:focus-visible, .small-btn:focus-visible { border-radius: 14px; }
  .genre-chip:focus-within { outline: 3px solid #2c5f2e; outline-offset: 2px; border-radius: 14px; }

  /* ── PRINT STYLES ── */
  @media print {
    @page { margin: 0.5in; size: letter; }
    body { font-size: 10pt; background: white; }
    #app { height: auto; }
    #header { background: white; color: black; border-bottom: 2pt solid black; padding: 8pt 0; }
    #header h1 { font-size: 16pt; }
    #filters, #result-bar, #print-btn, #list-panel .filter-actions { display: none !important; }
    #main { display: block; overflow: visible; }
    #map { height: 5in !important; page-break-after: avoid; border: 1pt solid #ccc; }
    #list-panel { width: 100%; border: none; overflow: visible; }
    .venue-card { page-break-inside: avoid; border-bottom: 0.5pt solid #ccc; padding: 4pt 0; }
    .venue-card:hover { background: none; }
    .venue-num { background: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    h2#print-list-heading { margin: 8pt 0 4pt; font-size: 12pt; border-top: 1pt solid black; padding-top: 6pt; }
  }
</style>
</head>

const ALL_GENRES = ["Americana", "Bluegrass", "Blues", "Classical", "Country", "Electronic", "Folk", "Funk", "Hip hop", "Indie", "Jazz", "Latin", "Metal", "Pop", "Punk", "R&B", "Rock", "Singer/songwriter", "Soul", "World"];

// ── State ──
let timeStart = 840;  // 2pm in minutes
let timeEnd   = 960;  // 4pm
let selectedGenres = new Set(ALL_GENRES);
let activeMarkers = [];
let highlightedIdx = null;

// ── Map init ──
const map = L.map('map', {
  zoomSnap: 0.25,         // finer snap for smoother pinch zoom
  zoomAnimation: true,
  scrollWheelZoom: false, // disable scroll-to-zoom; use pinch (ctrl+wheel) only
}).setView([42.3876, -71.0995], 14);

// Standard Mac trackpad: pinch fires as wheel+ctrlKey in Chrome/Firefox
map.getContainer().addEventListener('wheel', (e) => {
  if (e.ctrlKey) {
    e.preventDefault();
    const delta = -e.deltaY * (e.deltaMode === 1 ? 0.05 : 0.002);
    map.setZoom(map.getZoom() + delta, { animate: false });
  }
}, { passive: false });

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

function minsToLabel(m) {
  const h = Math.floor(m / 60);
  const mi = m % 60;
  const ampm = h >= 12 ? 'pm' : 'am';
  const h12 = h > 12 ? h - 12 : h === 0 ? 12 : h;
  return h12 + ':' + String(mi).padStart(2,'0') + ' ' + ampm;
}

// ── Genre chips ──
const genreGrid = document.getElementById('genre-grid');
ALL_GENRES.forEach(g => {
  const chip = document.createElement('label');
  chip.className = 'genre-chip checked';
  chip.innerHTML = `<input type="checkbox" value="${g}" checked onchange="onGenreChange(this)"> ${g}`;
  genreGrid.appendChild(chip);
});

function onGenreChange(cb) {
  if (cb.checked) selectedGenres.add(cb.value);
  else selectedGenres.delete(cb.value);
  cb.closest('.genre-chip').classList.toggle('checked', cb.checked);
  applyFilters();
}

function selectAllGenres() {
  selectedGenres = new Set(ALL_GENRES);
  document.querySelectorAll('#genre-grid input').forEach(cb => {
    cb.checked = true;
    cb.closest('.genre-chip').classList.add('checked');
  });
  applyFilters();
}

function clearGenres() {
  selectedGenres.clear();
  document.querySelectorAll('#genre-grid input').forEach(cb => {
    cb.checked = false;
    cb.closest('.genre-chip').classList.remove('checked');
  });
  applyFilters();
}

// ── Time controls ──
function setPreset(s, e) {
  timeStart = s; timeEnd = e;
  document.getElementById('time-start').value = s;
  document.getElementById('time-end').value = e;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  // find which preset matches
  const presetMap = {'720,840':'Noon–2pm','840,960':'2pm–4pm','960,1080':'4pm–6pm','720,1080':'All times'};
  document.querySelectorAll('.preset-btn').forEach(b => {
    const key = s + ',' + e;
    if (presetMap[key] && b.textContent.includes(presetMap[key])) b.classList.add('active');
  });
  updateTimeLabels();
  applyFilters();
}

function onSlider() {
  timeStart = parseInt(document.getElementById('time-start').value);
  timeEnd   = parseInt(document.getElementById('time-end').value);
  if (timeEnd <= timeStart) {
    timeEnd = timeStart + 15;
    document.getElementById('time-end').value = timeEnd;
  }
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  updateTimeLabels();
  applyFilters();
}

function updateTimeLabels() {
  const startLabel = minsToLabel(timeStart);
  const endLabel   = minsToLabel(timeEnd);
  document.getElementById('time-start-label').textContent = startLabel;
  document.getElementById('time-end-label').textContent   = endLabel;
  document.getElementById('time-start').setAttribute('aria-valuetext', startLabel);
  document.getElementById('time-end').setAttribute('aria-valuetext', endLabel);
}

// ── Filter logic ──
function venueMatchesFilters(venue) {
  const matchingShows = venue.shows.filter(showMatches);
  return matchingShows.length > 0;
}

function showMatches(show) {
  // Time overlap: show overlaps if starts before window end AND ends after window start
  const timeOk = show.start_min !== null && show.end_min !== null
    && show.start_min < timeEnd && show.end_min > timeStart;
  if (!timeOk) return false;
  // Genre: at least one of the show's genres is selected (or show has no genres)
  if (selectedGenres.size === 0) return false;
  if (show.genres.length === 0) return true;
  return show.genres.some(g => selectedGenres.has(g));
}

// Custom numbered icon
// Zone colors matching the official PorchFest map (all pass WCAG AA 4.5:1 with white text)
const ZONE_COLORS = {
  blue:   '#2563a5',  // 12pm–2pm  contrast ~6.2:1
  green:  '#1a7a3d',  // 2pm–4pm   contrast ~5.2:1
  orange: '#b85800',  // 4pm–6pm   contrast ~4.7:1
};

function zoneColor(start_min) {
  if (start_min === null) return ZONE_COLORS.green;
  if (start_min < 840)  return ZONE_COLORS.blue;
  if (start_min < 960)  return ZONE_COLORS.green;
  return ZONE_COLORS.orange;
}

function makeIcon(num, color) {
  const bg = color || ZONE_COLORS.green;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 22 14 22S28 24.5 28 14C28 6.27 21.73 0 14 0z" fill="${bg}"/>
    <text x="14" y="18" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="sans-serif">${num}</text>
  </svg>`;
  return L.divIcon({
    html: svg,
    iconSize: [28, 36],
    iconAnchor: [14, 36],
    popupAnchor: [0, -36],
    className: ''
  });
}

// ── Apply filters ──
let markerLayer = L.layerGroup().addTo(map);

function applyFilters() {
  markerLayer.clearLayers();
  activeMarkers = [];

  const venueList = document.getElementById('venue-list');
  venueList.innerHTML = '';
  let count = 0;
  let matchedVenues = [];

  VENUES.forEach(venue => {
    const matchingShows = venue.shows.filter(showMatches);
    if (matchingShows.length === 0) return;
    matchedVenues.push({ venue, matchingShows });
  });

  // Sort by address for consistent numbering
  matchedVenues.sort((a, b) => a.venue.address.localeCompare(b.venue.address));

  matchedVenues.forEach(({ venue, matchingShows }, idx) => {
    const num = idx + 1;
    // Color by earliest matching show's start time
    const earliest = matchingShows.reduce((a, b) => (a.start_min ?? 9999) < (b.start_min ?? 9999) ? a : b);
    const color = zoneColor(earliest.start_min);

    // Marker
    const marker = L.marker([venue.lat, venue.lng], { icon: makeIcon(num, color) });
    const popupHtml = buildPopup(venue, matchingShows, num);
    marker.bindPopup(popupHtml, { maxWidth: 280 });
    marker.bindTooltip(buildTooltip(venue, matchingShows), {
      direction: 'top', offset: [0, -38], opacity: 1, className: 'pf-tooltip'
    });
    marker.on('click', () => highlightCard(idx));
    markerLayer.addLayer(marker);
    activeMarkers.push(marker);

    // List card
    const card = document.createElement('div');
    card.className = 'venue-card';
    card.id = `card-${idx}`;
    card.innerHTML = buildCard(venue, matchingShows, num, color);
    card.addEventListener('click', () => {
      marker.openPopup();
      map.panTo([venue.lat, venue.lng]);
      highlightCard(idx);
    });
    venueList.appendChild(card);
    count++;
  });

  document.getElementById('result-bar').textContent =
    `Showing ${count} venue${count !== 1 ? 's' : ''} · ${minsToLabel(timeStart)} – ${minsToLabel(timeEnd)}`;
  
  document.getElementById('print-list-heading').style.display = count > 0 ? 'block' : 'none';
}

function buildTooltip(venue, shows) {
  const lines = shows.map(s => {
    const genres = s.genres.join(', ') || s.genre;
    return `<span class="tt-name">${s.name}</span>${genres ? `<span class="tt-genre"> · ${genres}</span>` : ''}`;
  }).join('<br>');
  return `<div class="tt-addr">${venue.address}</div>${lines}`;
}

function buildPopup(venue, shows, num) {
  let html = `<div class="popup-content"><div class="popup-addr">${num}. ${venue.address}<br><small style="color:#888;font-weight:400">Somerville, MA</small></div>`;
  shows.forEach(s => {
    html += `<div class="popup-show">
      <div class="popup-show-name">${s.name}</div>
      <div class="popup-show-meta">${s.time}</div>
      <div class="popup-show-meta">${s.genres.join(', ') || s.genre}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function buildCard(venue, shows, num, color) {
  let html = `<div style="display:flex;align-items:flex-start;">
    <span class="venue-num" style="background:${color || ZONE_COLORS.green}">${num}</span>
    <span class="venue-addr">${venue.address}</span></div>`;
  shows.forEach(s => {
    html += `<div class="show-item">
      <div class="show-name">${s.name}</div>
      <div class="show-meta">${s.time} · ${s.genres.join(', ') || s.genre}</div>
    </div>`;
  });
  return html;
}

function highlightCard(idx) {
  if (highlightedIdx !== null) {
    const prev = document.getElementById(`card-${highlightedIdx}`);
    if (prev) prev.classList.remove('highlighted');
  }
  highlightedIdx = idx;
  const card = document.getElementById(`card-${idx}`);
  if (card) {
    card.classList.add('highlighted');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// Initial render
updateTimeLabels();
applyFilters();
</script>
